<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2d6cdf" />
    <title>サプライズルーティン</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <main class="app">
      <nav class="top-nav">
        <span class="period" id="periodLabel">期間を計算中...</span>
        <a href="./history.html">振り返り画面へ</a>
      </nav>

      <section class="card">
        <h1 class="title">週次ルーティン振り返り</h1>
        <p class="hint">日曜日始まりの1週間を対象にチェックします。</p>

        <div id="routineContainer"></div>

        <div class="stats" id="statsLabel">達成: 0/32（0%）</div>

        <div class="actions">
          <button id="saveBtn">今週の記録を保存</button>
          <p class="hint" id="saveStatus"></p>
        </div>
      </section>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
